name: Weekly Data Refresh

on:
  schedule:
    - cron: '0 6 * * 0'   # Every Sunday 06:00 UTC
  workflow_dispatch:        # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    concurrency:
      group: weekly-data-refresh
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rebuild site data
        run: python build_site_data.py

      - name: Commit updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data.json
          if git diff --staged --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "chore: weekly data refresh $(date -u +'%Y-%m-%d')"
            git push
          fi
